# CI-only services: reuse idapro-linux test images (see ida-sigmaker).
services:
    idapro-tests:
        image: ghcr.io/mahmoudimus/idapro-linux:idapro-tests@sha256:6acc4756c48d3eecfbb85904361365e6f138844f784a93827597074d3d451ab2
        entrypoint: ["python3"]
        working_dir: /work
        environment:
            - CONTAINER_TIMEZONE=America/Los_Angeles
            - IDAUSR=/root/.idapro
            - PYTHONPATH=/app/ida/python:/work/src
            - PYTHONWARNINGS=ignore
            # Let the AST oracle find IDA's bundled libclang without manual env.
            - IDA_INSTALL_DIR=/app/ida
            - IDAVATOR_LIBCLANG_PATH=/app/ida/libclang.so
        volumes:
            - ./:/work

    idapro-tests-9.2:
        image: ghcr.io/mahmoudimus/idapro-linux:idapro-tests-9.2@sha256:541790eb853f2a46ff713476c596cb3164d719bc33d5d3c4027687d5d9e2f1ba
        entrypoint: ["python3"]
        working_dir: /work
        environment:
            - CONTAINER_TIMEZONE=America/Los_Angeles
            - IDAUSR=/root/.idapro
            - PYTHONPATH=/app/ida/python:/work/src
            - PYTHONWARNINGS=ignore
            # Let the AST oracle find IDA's bundled libclang without manual env.
            - IDA_INSTALL_DIR=/app/ida
            - IDAVATOR_LIBCLANG_PATH=/app/ida/libclang.so
        volumes:
            - ./:/work
