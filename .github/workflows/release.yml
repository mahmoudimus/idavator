name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag name (e.g. v1.2.3). If empty, uses the pushed tag."
                required: false
                default: ""
    workflow_run:
        workflows: [idavator tests]
        types:
            - completed

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref || github.run_id }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    release-from-workflow-run:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'workflow_run' &&
            github.event.workflow_run.conclusion == 'success'
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}
                  fetch-tags: true

            - name: Extract version from tag
              id: version
              run: |
                  TAGS=$(git tag --points-at HEAD | tr -d '\r')
                  TAG=$(printf '%s\n' "$TAGS" | grep -E '^v' | head -n1 || true)
                  if [ -z "$TAG" ]; then
                      echo "should_release=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi
                  echo "ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
                  echo "should_release=true" >> "$GITHUB_OUTPUT"

            - name: Skip if release already exists
              id: guard
              if: steps.version.outputs.should_release == 'true'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
                    echo "already=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "already=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Validate tag matches idavator.__version__
              if: steps.version.outputs.should_release == 'true' && steps.guard.outputs.already == 'false'
              run: |
                  PKG=$(python3 -c "import ast,pathlib; m=ast.parse(pathlib.Path('src/idavator/__init__.py').read_text()); print([ast.literal_eval(n.value) for n in m.body if isinstance(n,ast.Assign) and any(getattr(t,'id','')=='__version__' for t in n.targets)][0])")
                  TAG_VER="${{ steps.version.outputs.version }}"
                  echo "package __version__=$PKG  tag version=$TAG_VER"
                  if [ "$PKG" != "$TAG_VER" ]; then
                    echo "::error::tag v$TAG_VER does not match idavator.__version__ ($PKG); bump src/idavator/__init__.py before tagging"
                    exit 1
                  fi

            - name: Build sdist
              if: steps.version.outputs.should_release == 'true' && steps.guard.outputs.already == 'false'
              run: |
                  python -m pip install --upgrade pip build
                  python -m build --sdist

            - name: Publish GitHub release
              if: steps.version.outputs.should_release == 'true' && steps.guard.outputs.already == 'false'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  name: ${{ steps.version.outputs.tag }}
                  files: dist/*
                  generate_release_notes: true
                  draft: false
                  prerelease: ${{ contains(steps.version.outputs.version, '-') }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    release-from-tag:
        runs-on: ubuntu-latest
        if: >
            (
              github.event_name == 'push' &&
              startsWith(github.ref, 'refs/tags/v')
            ) || (
              github.event_name == 'workflow_dispatch'
            )
        steps:
            - name: Extract version from tag
              id: version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
                    IN='${{ github.event.inputs.tag }}'
                    if [[ "$IN" == refs/* ]]; then REF="$IN"; else REF="refs/tags/$IN"; fi
                    TAG="${REF#refs/tags/}"
                    echo "ref=$REF" >> "$GITHUB_OUTPUT"
                    echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                    echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
                  else
                    echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
                    echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
                    echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Skip if release already exists
              id: guard
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
                    echo "already=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "already=false" >> "$GITHUB_OUTPUT"
                  fi

            - uses: actions/checkout@v4
              if: steps.guard.outputs.already == 'false'
              with:
                  ref: ${{ steps.version.outputs.ref }}
                  fetch-tags: true

            - name: Validate tag matches idavator.__version__
              if: steps.guard.outputs.already == 'false'
              run: |
                  PKG=$(python3 -c "import ast,pathlib; m=ast.parse(pathlib.Path('src/idavator/__init__.py').read_text()); print([ast.literal_eval(n.value) for n in m.body if isinstance(n,ast.Assign) and any(getattr(t,'id','')=='__version__' for t in n.targets)][0])")
                  TAG_VER="${{ steps.version.outputs.version }}"
                  echo "package __version__=$PKG  tag version=$TAG_VER"
                  if [ "$PKG" != "$TAG_VER" ]; then
                    echo "::error::tag v$TAG_VER does not match idavator.__version__ ($PKG); bump src/idavator/__init__.py before tagging"
                    exit 1
                  fi

            - name: Build sdist
              if: steps.guard.outputs.already == 'false'
              run: |
                  python -m pip install --upgrade pip build
                  python -m build --sdist

            - name: Publish GitHub release
              if: steps.guard.outputs.already == 'false'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  name: ${{ steps.version.outputs.tag }}
                  files: dist/*
                  generate_release_notes: true
                  draft: false
                  prerelease: ${{ contains(steps.version.outputs.version, '-') }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
