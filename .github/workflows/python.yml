name: idavator tests

on:
    push:
        branches:
            - "main"
    pull_request:
        types:
            - synchronize
            - opened
            - reopened
            - ready_for_review
        branches:
            - "main"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
    cancel-in-progress: true

jobs:
    pytest-offline:
        name: pytest (no idalib)
        runs-on: ubuntu-24.04
        strategy:
            matrix:
                python-version: ["3.10", "3.12"]
        env:
            PYTHONPATH: ${{ github.workspace }}/src
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install package and test deps
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"

            - name: Run offline pytest suite
              run: |
                  pytest -m "not ida" -v

    ida-tests:
        name: pytest (idalib, ${{ matrix.service }})
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10"]
                service: ["idapro-tests", "idapro-tests-9.2"]
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GHCR_TOKEN }}

            - name: Create .env if missing
              run: |
                  if [ ! -f .env ]; then
                      touch .env
                  fi

            - name: Cache Docker image
              id: docker-cache
              uses: actions/cache@v4
              with:
                  path: /tmp/docker-cache
                  key: docker-image-${{ runner.os }}-${{ matrix.service }}-${{ hashFiles('docker-compose.yml') }}
                  restore-keys: |
                      docker-image-${{ runner.os }}-${{ matrix.service }}-

            - name: Load cached Docker image
              if: steps.docker-cache.outputs.cache-hit == 'true'
              run: |
                  docker load -i /tmp/docker-cache/${{ matrix.service }}.tar || true

            - name: Run idalib pytest suite
              run: |
                  set -e
                  docker compose run --rm --entrypoint bash ${{ matrix.service }} -c "
                      set -e
                      python3 -m pip install --upgrade pip
                      pip install -e '.[dev]'
                      pytest -v
                  "
                  docker compose logs

            - name: Save Docker image to cache
              if: steps.docker-cache.outputs.cache-hit != 'true'
              run: |
                  mkdir -p /tmp/docker-cache
                  TAG='${{ matrix.service }}'
                  SHA_NAME=$(curl -s -u ${{ secrets.GHCR_TOKEN }} \
                    -H 'Accept: application/vnd.github+json' \
                    -H 'X-GitHub-Api-Version: 2022-11-28' \
                    https://api.github.com/users/mahmoudimus/packages/container/idapro-linux/versions | \
                    jq -r ".[]|select(.metadata.container.tags[]==\"${TAG}\")|.name")
                  docker save $(docker images --format '{{.Repository}}')@${SHA_NAME} \
                    -o /tmp/docker-cache/${{ matrix.service }}.tar || true
